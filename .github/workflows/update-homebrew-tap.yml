name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "$GITHUB_REF_NAME" \
            --pattern "LlamaMate-*.dmg" \
            --dir ./artifacts \
            --repo "$GITHUB_REPOSITORY"
          ls -la artifacts/

      - name: Compute SHA256
        id: hash
        run: |
          set -euo pipefail
          DMG=$(ls artifacts/LlamaMate-*.dmg | head -1)
          if command -v sha256sum >/dev/null 2>&1; then
            SHA=$(sha256sum "$DMG" | awk '{print $1}')
          else
            SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "DMG: $DMG"
          echo "SHA256: $SHA"

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clone tap repo
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone https://x-access-token:${TAP_REPO_TOKEN}@github.com/Ito-69/homebrew-llamamate.git tap

      - name: Update cask
        env:
          SHA: ${{ steps.hash.outputs.sha }}
          VER: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd tap
          sed -i.bak \
            -e "s/^  version \".*\"/  version \"${VER}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" \
            Casks/llamamate.rb
          rm Casks/llamamate.rb.bak
          cat Casks/llamamate.rb

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VER: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git branch -D "bump-llamamate-${VER}" 2>/dev/null || true
          git push origin --delete "bump-llamamate-${VER}" 2>/dev/null || true
          git checkout -b "bump-llamamate-${VER}"
          git add Casks/llamamate.rb
          git commit -m "llamamate ${VER}"
          git push -u origin "bump-llamamate-${VER}"

          gh pr create \
            --repo Ito-69/homebrew-llamamate \
            --head "bump-llamamate-${VER}" \
            --base main \
            --title "llamamate ${VER}" \
            --body "Automated update from llama.cpp_install_on_macos release v${VER}."
